# PR gates, cribbed from kaish's ci.yml: clippy on the wasm target (the only
# target kaish-web builds for) and the full site build + real-time e2e — the
# same checks pages.yml runs before deploying, so a green PR means a
# deployable main. Runs on pull_request only: pushes to main get the identical
# build + e2e inside pages.yml, and running both there would double the work.
#
# Actions are pinned by commit SHA, not tag — a tag can be moved, a digest
# can't (supply-chain). Each pin carries a `# vX.Y.Z` comment naming the
# release it points at, for humans and Dependabot.
name: ci

on:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  clippy:
    name: clippy (wasm target)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # stable branch, pinned 2026-07-05
        with:
          toolchain: stable
          targets: wasm32-unknown-unknown

      - name: Cache cargo
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          key: clippy-wasm

      - name: Clippy (deny warnings)
        run: cargo clippy --target wasm32-unknown-unknown -p kaish-web --all-targets --locked -- -D warnings

  site-e2e:
    name: site build + e2e
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # The playground seeds kaish's own source tree; check it out beside us.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: tobert/kaish
          path: kaish-src

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # stable branch, pinned 2026-07-05
        with:
          toolchain: stable
          targets: wasm32-unknown-unknown

      - name: Cache cargo
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          key: site-e2e

      - name: Install binaryen (wasm-opt)
        run: sudo apt-get update && sudo apt-get install -y binaryen

      - name: Install wasm-bindgen-cli (locked version)
        run: |
          ver=$(grep -A1 '^name = "wasm-bindgen"$' Cargo.lock | grep '^version' | cut -d'"' -f2)
          echo "wasm-bindgen $ver"
          cargo install wasm-bindgen-cli --version "$ver" --locked

      - name: Build site
        run: scripts/build-site.sh ./kaish-src

      - uses: denoland/setup-deno@22d081ff2d3a40755e97629de92e3bcbfa7cf2ed # v2.0.5
        with:
          deno-version: v2.x

      - name: e2e against the built site (runner's chrome, real-time CDP)
        run: |
          python3 -m http.server -d site 8137 &
          sleep 1
          deno run --allow-net --allow-run scripts/e2e.ts
